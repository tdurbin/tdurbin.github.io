<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Page</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
            gap: 2rem;
        }
        form {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        div {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        .table-container {
            width: 100%;
            max-width: 600px;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #007bff;
            color: #fff;
        }
        #downloadBtn {
            background-color: #28a745;
        }
        #downloadBtn:hover {
            background-color: #218838;
        }
        .action-btn {
            width: auto;
            padding: 0.4rem 0.8rem;
            font-size: 0.875rem;
            margin-top: 0;
            margin-right: 0.5rem;
        }
        .edit-btn { background-color: #ffc107; color: #212529; }
        .edit-btn:hover { background-color: #e0a800; }
        .save-btn { background-color: #28a745; color: #fff; }
        .save-btn:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; color: #fff; }
        .delete-btn:hover { background-color: #c82333; }
        
        #deleteAllBtn { background-color: #dc3545; }
        #deleteAllBtn:hover { background-color: #c82333; }
        
        .button-group {
            display: flex;
            gap: 1rem;
        }
        
        .editable {
            background-color: #fff3cd;
            outline: 2px dashed #ffc107;
            outline-offset: -2px;
        }

        @media (max-width: 480px) {
            form {
                padding: 1.5rem;
            }
        }
        .error {
            border: 2px solid #dc3545 !important;
            background-color: #ffe6e6;
        }
    </style>
</head>
<body>
    <form id="contactForm" action="#" method="POST">
        <div>
            <label for="title">Title:</label>
            <select id="title" name="title" required>
                <option value="" disabled selected>Select a title...</option>
                <option value="Mr.">Mr.</option>
                <option value="Mrs.">Mrs.</option>
                <option value="Ms.">Ms.</option>
                <option value="Dr.">Dr.</option>
            </select>
        </div>
        <div>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>
        <div>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>
        <div>
            <label for="telNumber">Telephone Number:</label>
            <input type="tel" id="telNumber" name="telNumber">
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>

    <div class="table-container" id="tableContainer">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Telephone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <div class="button-group">
            <button id="downloadBtn" type="button">Download CSV</button>
            <button id="deleteAllBtn" type="button">Delete All Data</button>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            const titleInput = document.getElementById('title');
            const firstNameInput = document.getElementById('firstName');
            const lastNameInput = document.getElementById('lastName');
            const telNumberInput = document.getElementById('telNumber');

            // Reset previous error states
            titleInput.classList.remove('error');
            firstNameInput.classList.remove('error');
            lastNameInput.classList.remove('error');
            telNumberInput.classList.remove('error');

            const title = titleInput.value;
            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const telNumber = telNumberInput.value.trim();

            // Basic regex to ensure the phone number only contains digits, spaces, dashes, or parentheses
            const phoneRegex = /^[0-9\-\+\s\(\)]*$/;
            let hasError = false;

            if (!title) {
                titleInput.classList.add('error');
                hasError = true;
            }
            if (!firstName) {
                firstNameInput.classList.add('error');
                hasError = true;
            }
            if (!lastName) {
                lastNameInput.classList.add('error');
                hasError = true;
            }
            if (telNumber && !phoneRegex.test(telNumber)) {
                telNumberInput.classList.add('error');
                hasError = true;
            }

            if (hasError) {
                alert('Please correct the highlighted fields.');
                event.preventDefault(); // Stop the form from submitting
            } else {
                event.preventDefault(); // Prevent standard page reload

                // Add a new row to the table
                const tbody = document.querySelector('#dataTable tbody');
                const row = document.createElement('tr');
                row.innerHTML = `<td>${title}</td><td>${firstName}</td><td>${lastName}</td><td>${telNumber}</td>
                                 <td>
                                     <button class="action-btn edit-btn" type="button">Edit</button>
                                     <button class="action-btn delete-btn" type="button">Delete</button>
                                 </td>`;
                tbody.appendChild(row);

                // Reveal the table container and clear the form
                document.getElementById('tableContainer').style.display = 'flex';
                event.target.reset();
            }
        });

        // Download CSV functionality
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const table = document.getElementById('dataTable');
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll('td:not(:last-child), th:not(:last-child)');
                for (let j = 0; j < cols.length; j++) {
                    let data = cols[j].innerText.replace(/"/g, '""'); // Escape quotes for CSV safety
                    row.push('"' + data + '"'); // Wrap fields in quotes to handle potential commas
                }
                csv.push(row.join(','));
            }
            
            // Create a Blob containing the CSV data and trigger a download via a hidden link
            const csvFile = new Blob([csv.join('\n')], { type: 'text/csv' });
            const downloadLink = document.createElement('a');
            downloadLink.download = 'form_data.csv';
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = 'none';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });

        // Table actions (Edit / Delete)
        document.getElementById('dataTable').addEventListener('click', function(e) {
            if (e.target.classList.contains('delete-btn')) {
                e.target.closest('tr').remove();
                // Hide table if all rows are deleted
                if (document.querySelector('#dataTable tbody').children.length === 0) {
                    document.getElementById('tableContainer').style.display = 'none';
                }
            } else if (e.target.classList.contains('edit-btn') || e.target.classList.contains('save-btn')) {
                const btn = e.target;
                const tr = btn.closest('tr');
                const cells = tr.querySelectorAll('td:not(:last-child)'); // Select all cells except the 'Actions' column
                
                if (btn.innerText === 'Edit') {
                    btn.innerText = 'Save';
                    btn.classList.replace('edit-btn', 'save-btn');
                    cells.forEach(cell => {
                        cell.contentEditable = 'true';
                        cell.classList.add('editable');
                    });
                    cells[0].focus();
                } else {
                    btn.innerText = 'Edit';
                    btn.classList.replace('save-btn', 'edit-btn');
                    cells.forEach(cell => {
                        cell.contentEditable = 'false';
                        cell.classList.remove('editable');
                    });
                }
            }
        });

        // Delete All Data functionality
        document.getElementById('deleteAllBtn').addEventListener('click', function() {
            if (confirm('Are you sure you want to completely erase all entered data?')) {
                document.querySelector('#dataTable tbody').innerHTML = '';
                document.getElementById('tableContainer').style.display = 'none';
            }
        });
    </script>
</body>
</html>
